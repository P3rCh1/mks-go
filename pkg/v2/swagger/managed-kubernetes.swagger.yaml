        id:
          description: The identifier of the task.
          format: uuid4
          type: string
          example: 506E0300-736A-11F0-B558-0800200C9A66
        cluster_id:
          description: Contains cluster identifier.
          format: uuid4
          type: string
          example: 03C71900-736B-11F0-B558-0800200C9A66
