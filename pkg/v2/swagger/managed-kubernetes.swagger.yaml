    delete:
      summary: Delete all registries integrations
      description: Delete all registries integrations in provided cluster
      operationId: deleteRegistriesV2
      parameters:
        - $ref: '#/components/parameters/cluster_id'
      tags:
        - Registries
      responses:
        '204':
          description: Integrations deletion process started successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_no_content'
        '400':
          description: Invalid request path parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
        '404':
