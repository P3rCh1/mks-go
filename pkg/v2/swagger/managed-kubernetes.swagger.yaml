        '404':
          description: Cluster or nodegroup not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
        '409':
          description: Cluster or one of nodegroups has invalid status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
    delete:
      summary: Delete nodegroup.
      description: Deletes nodegorup by provided cluster_id and nodegroup_id.
      operationId: deleteNodegroupV2
      parameters:
        - $ref: '#/components/parameters/cluster_id'
        - $ref: '#/components/parameters/nodegroup_id'
      tags:
        - Nodegroups
      responses:
        '204':
          description: Nodegroup deletion started successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_no_content'
        '400':
          description: Invalid request body or path parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
        '404':
          description: Cluster or nodegroup not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
        '409':
          description: Cluster or one of nodegroups has invalid status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
  /v2/clusters/{cluster_id}/nodegroups/{nodegroup_id}/resize:
    post:
      summary: Resize nodegroup
      description: Resize nodegroup by provided cluster_id and nodegroup_id.
      operationId: resizeNodegroupV2
      parameters:
        - $ref: '#/components/parameters/cluster_id'
        - $ref: '#/components/parameters/nodegroup_id'
      requestBody:
        content:
          application/json:
