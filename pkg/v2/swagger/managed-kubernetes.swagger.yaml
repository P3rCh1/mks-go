openapi: 3.0.0
info:
  title: Managed Kubernetes API
  description: 'Managing clusters, node groups, and Managed Kubernetes nodes: creating a cluster, automating cluster maintenance, and more'
  version: 2.0.0
servers:
  - url: https://test-domain.selectel.org
tags:
  - name: Clusters
    description: 'Managing kubernetes clusters: create, update, delete, automate cluster maintenance, and more'
  - name: Nodegroups
    description: 'Managing nodegroups in the clusters: create, update, delete, resize, automate scaling, and more'
  - name: Nodes
    description: 'Managing nodegroups in the nodegroups: delete, reinstall, and more'
  - name: Actions
    description: Managing available actions with clusters and nodegroups
  - name: Tasks
    description: Managing cluster's tasks
  - name: AdmissionControllers
    description: Managing supported admission controllers
  - name: FeatureGates
    description: Managing supported feature gates
  - name: Kubeversions
    description: Managing supported Kubernetes versions
  - name: Registries
    description: Managing registries integrations
  - name: Extras
    description: Managing extra information about resources
paths:
  /v2/clusters:
    get:
      summary: Get all clusters
      description: Returns list of clusters.
      operationId: listClustersV2
      tags:
        - Clusters
      responses:
        '200':
          description: Clusters list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterList'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
    post:
      summary: Create a new cluster
      description: Start cluster creation process.
      operationId: createClusterV2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClusterCreateBody'
        description: Cluster create request body.
        required: true
      tags:
        - Clusters
      responses:
        '201':
          description: Cluster creation started successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterResp'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
  /v2/clusters/{cluster_id}:
    get:
      summary: Get cluster information
      description: Returns single cluster by provided cluster_id.
      operationId: getClusterV2
      tags:
        - Clusters
      parameters:
        - $ref: '#/components/parameters/cluster_id'
      responses:
        '200':
          description: Cluster Information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterResp'
        '404':
          description: Cluster Not Found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_not_found_error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
    put:
      summary: Update cluster
      description: Update cluster parameters.
      operationId: updateClusterV2
      tags:
        - Clusters
      parameters:
        - $ref: '#/components/parameters/cluster_id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClusterUpdateBody'
        description: Cluster update request body.
        required: true
      responses:
        '200':
          description: Cluster updating started successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterResp'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
    delete:
      summary: Delete cluster.
      description: Deletes cluster by provided cluster_id.
      operationId: deleteClusterV2
      parameters:
        - $ref: '#/components/parameters/cluster_id'
      tags:
        - Clusters
      responses:
        '204':
          description: Cluster Successfully Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_no_content'
        '404':
          description: Cluster Not Found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_not_found_error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
  /v2/clusters/{cluster_id}/actions:
    get:
      summary: Get available actions for cluster
      description: Returns available actions for cluster.
      operationId: getClusterActionsV2
      parameters:
        - $ref: '#/components/parameters/cluster_id'
        - $ref: '#/components/parameters/lang'
      tags:
        - Clusters
        - Actions
      responses:
        '200':
          description: Information about cluster actions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterActionsResp'
        '404':
          description: Cluster Not Found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_not_found_error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
  /v2/clusters/{cluster_id}/kubeconfig:
    get:
      summary: Get cluster kubeconfig
      description: Returns kubeconfig in YAML for requested cluster.
      operationId: getClusterKubeconfigV2
      parameters:
        - $ref: '#/components/parameters/cluster_id'
      tags:
        - Clusters
      responses:
        '200':
          description: Cluster kubeconfig.
        '404':
          description: Cluster Not Found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_not_found_error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
  /v2/clusters/{cluster_id}/rotate-certs:
    post:
      summary: Rotate cluster certificates
      description: Starts certificates rotation task.
      operationId: rotateClusterCertsV2
      parameters:
        - $ref: '#/components/parameters/cluster_id'
      tags:
        - Clusters
      responses:
        '204':
          description: Certificates rotation started successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_no_content'
        '404':
          description: Cluster Not Found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_not_found_error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
  /v2/clusters/{cluster_id}/upgrade-patch-version:
    post:
      summary: Upgrade cluster patch version
      description: Starts upgrade patch version task.
      operationId: upgradePatchVersionV2
      parameters:
        - $ref: '#/components/parameters/cluster_id'
      tags:
        - Clusters
      responses:
        '200':
          description: Cluster upgrading process started successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterResp'
        '404':
          description: Cluster Not Found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_not_found_error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
  /v2/clusters/{cluster_id}/upgrade-minor-version:
    post:
      summary: Upgrade cluster minor version
      description: Starts upgrade minor version task.
      operationId: upgradeMinorVersionV2
      parameters:
        - $ref: '#/components/parameters/cluster_id'
      tags:
        - Clusters
      responses:
        '200':
          description: Cluster upgrading process started successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterResp'
        '404':
          description: Cluster Not Found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_not_found_error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
  /v2/clusters/{cluster_id}/tasks:
    get:
      summary: Get all cluster tasks
      description: Returns tasks of the cluster.
      operationId: listTasksV2
      parameters:
        - $ref: '#/components/parameters/cluster_id'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/with_error_details'
      tags:
        - Tasks
      responses:
        '200':
          description: Cluster's task list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskList'
        '404':
          description: Cluster Not Found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_not_found_error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
  /v2/clusters/{cluster_id}/tasks/{task_id}:
    get:
      summary: Get task of the cluster
      description: Returns task of the cluster.
      operationId: getTaskV2
      parameters:
        - $ref: '#/components/parameters/cluster_id'
        - $ref: '#/components/parameters/task_id'
        - $ref: '#/components/parameters/with_error_details'
      tags:
        - Tasks
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResp'
        '404':
          description: Cluster or Task Not Found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_not_found_error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
  /v2/clusters/{cluster_id}/nodegroups:
    get:
      summary: Get all nodegroups of the cluster
      description: Returns list of nodegroups of the cluster.
      operationId: listNodegroupsV2
      parameters:
        - $ref: '#/components/parameters/cluster_id'
      tags:
        - Nodegroups
      responses:
        '200':
          description: Nodegroups list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodegroupList'
        '400':
          description: Invalid path parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
        '404':
          description: Cluster or nodegroup not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_not_found_error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
    post:
      summary: Create new nodegroups
      description: Start nodegroups creation process.
      operationId: createNodegroupsV2
      parameters:
        - $ref: '#/components/parameters/cluster_id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodegroupsCreateBody'
        description: Nodegroups create request body.
        required: true
      tags:
        - Nodegroups
      responses:
        '204':
          description: Nodegroups creation started successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_no_content'
        '400':
          description: Invalid request body or path parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
        '404':
          description: Cluster not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
        '409':
          description: Cluster or one of nodegroups has invalid status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
  /v2/clusters/{cluster_id}/nodegroups/{nodegroup_id}:
