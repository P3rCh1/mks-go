        '404':
          description: Cluster not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
    put:
      summary: Update registries integrations
      description: Update registries integration in provided cluster
      operationId: updateRegistriesV2
      parameters:
        - $ref: '#/components/parameters/cluster_id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistriesIntergrationUpdateBody'
        description: Registries integrations update request body.
        required: true
      tags:
        - Registries
      responses:
        '200':
          description: Integrations updating process started successfully.
          content:
            application/json:
