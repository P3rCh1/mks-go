      tags:
        - Registries
      responses:
        '200':
          description: Registries integration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistriesIntegration'
        '400':
          description: Invalid request path parameters.
          content:
            application/json:
              schema:
