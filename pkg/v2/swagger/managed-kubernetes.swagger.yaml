      responses:
        '200':
          description: Information about cluster actions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodegroupActionsResp'
        '400':
          description: Invalid request body, path or query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
        '404':
          description: Cluster or nodegroup not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic_error'
        '409':
          description: Cluster or one of nodegroups has invalid status.
          content:
            application/json:
