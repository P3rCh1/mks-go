components:
  schemas:
    AuditLogs:
      type: object
      required:
        - enabled
        - secret_name
      properties:
        enabled:
          description: |-
            If `enabled` kubernetes audit logs should be collected
            and pushed into SIEM system (e.g. logstash).
            False by default.
          type: boolean
          example: true
        secret_name:
          description: 'Contains name of the kubernetes secret in namespace kube-system with credentials of SIEM system where logs should be pushed. Fields of the secret: host, port, username (optional), password (optional), ca.crt (optional). This field is optional. By default, used mks-audit-logs. Secret name should be as a DNS subdomain name as defined in RFC 1123. [More Information.](https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#dns-subdomain-names)'
          type: string
    OIDC:
      description: OIDC represents parameters to connect client's OIDC provider with kubernetes.
      required:
        - client_id
        - enabled
        - groups_claim
        - issuer_url
        - provider_name
        - username_claim
        - ca_certs
      type: object
      properties:
        client_id:
          description: Represents required client id that all tokens must be issued for. Will be placed in `--oidc-client-id` flag. It is required when enabled = true.
          type: string
        enabled:
          description: |-
            If `enabled` OIDC should be turned on in the cluster.
            False by default.
          type: boolean
        groups_claim:
          description: Represents optional JWT claim to use as the user's group. By default, `groups`. Will be placed in `--oidc-groups-claim` flag.
          type: string
        issuer_url:
          description: Represents URL of the provider that allows the API server to discover public signing keys. Will be placed in `--oidc-issuer-url` flag. It is required when enabled = true.
          type: string
        provider_name:
          description: Represents custom user defined name of the provider. It is not used in the cluster directly. It is required when enabled = true.
          type: string
        username_claim:
          description: Represents optional JWT claim to use as the username. By default, `sub`. Will be placed in `--oidc-username-claim` flag.
          type: string
        ca_certs:
          description: |-
            CACerts represent optional custom CA certs chain in X509 PEM format of provider's SSL certificate.
            Will be written to file on masters which will be passed in `--oidc-ca-file` kube-apiserver flag.
          x-omitempty: true
          type: string
        ca_certs_expiration:
          description: CACertsExpiration represents date and time when the first of provided CA certificates will be expired.
          format: date-time
          x-omitempty: true
          type: string
    KubernetesOptions:
      type: object
      required:
        - admission_controllers
        - audit_logs
        - feature_gates
        - oidc
        - x509_ca_certificates
      description: |-
        Represents additional k8s options such as pod security policy,
        feature gates and etc.
      properties:
        admission_controllers:
          description: Represents turned on admission controllers for the cluster.
          items:
            type: string
          type: array
        audit_logs:
          $ref: '#/components/schemas/AuditLogs'
        feature_gates:
          description: Represents turned on feature gates
          items:
            type: string
          type: array
        oidc:
          $ref: '#/components/schemas/OIDC'
        x509_ca_certificates:
          description: Represent custom X509 CA certs which can be used for cluster components. Certificates should be encoded to base64 format. Note 💡 ``` X509CaCertificates can be disabled for some pools. ```
          x-omitempty: true
          type: string
    Cluster:
      description: Provides information about cluster.
      required:
        - id
        - created_at
        - updated_at
        - name
        - project_id
        - status
        - basic
        - enable_autorepair
        - enable_patch_version_auto_upgrade
        - private_kube_api
        - kube_api_ip
        - subnet_id
        - kube_version
        - network_id
        - network_type
        - pool
        - kubernetes_options
        - cni_type
      type: object
      properties:
        id:
          description: Uniq identifier of the cluster.
          type: string
          format: uuid4
          example: 5C2B9606-F7FA-4468-AD98-E389D5334CBA
        created_at:
          description: Timestamp in UTC timezone of when the cluster has been created.
          type: string
          format: date-time
          example: '2019-11-04T10:21:11.943917Z'
        updated_at:
          description: Timestamp in UTC timezone of when the cluster has been updated.
          format: date-time
          type: string
          example: '2019-11-04T10:21:11.943917Z'
        name:
          description: Represents the name of the cluster.
          type: string
          example: super-mks-cluster
        project_id:
          description: Contains reference to the project of the cluster.
          type: string
          example: 8D226B33-3897-4223-AAAF-A83D49C5399E
        status:
          description: Represents current status of the cluster.
          type: string
          enum:
            - ACTIVE
            - ERROR
            - DELETED
            - CREATING
          example: ACTIVE
        basic:
          description: Specifies that cluster has only a single master and that control-plane is not in highly available mode.
          type: boolean
          example: true
        enable_autorepair:
          description: Reflects if worker nodes are allowed to be reinstalled automatically in case of their unavailability or unhealthiness.
          type: boolean
          example: true
        enable_patch_version_auto_upgrade:
          description: Specifies if Kubernetes version of the cluster is allowed to be upgraded automatically.
          type: boolean
          example: true
        private_kube_api:
          description: Represents if kube API is available from the Internet or not.
          type: boolean
          example: true
        kube_api_ip:
          description: Represents the IP of the Kubernetes API.
          type: string
          example: 10.10.1.1
        subnet_id:
          description: Contains reference to the subnet of the cluster.
          format: uuid4
          type: string
          example: 0FAB540C-1099-4A4A-AD6C-C1498BE74E0A
        kube_version:
          description: Represents the current Kubernetes version of the cluster.
          type: string
          example: 1.32
        network_id:
          description: Contains reference to the network of the cluster.
          format: uuid4
          type: string
          example: EE102156-A9A8-423A-811D-F8E3C56891B7
        network_type:
          description: Represents type of network l3vpn or default.
          type: string
          enum:
            - STANDARD
            - L3VPN
        pool:
          description: Represents the pool of where the cluster master nodes are located.
          type: string
          example: ru-9
        kubernetes_options:
          $ref: '#/components/schemas/KubernetesOptions'
        cni_type:
          description: CNI type represents type of CNI which is used in cluster.
          type: string
          enum:
            - CALICO
            - CILIUM
    ClusterList:
      description: List of clusters.
      type: object
      properties:
        clusters:
          type: array
          items:
            $ref: '#/components/schemas/Cluster'
    generic_error:
      description: Generic Error.
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              description: Error Message.
              type: string
              example: Some error occurred
          required:
            - message
      required:
        - error
    CNICiliumSettings:
      type: object
      description: |-
        Represents settings for Cilium CNI if this CNI was chosen as "cni_type".
        Otherwise settings will be ignored.
      properties:
        hubble_relay:
          description: Enables hubble relay for Cilium CNI.
          type: boolean
          default: true
        envoy_daemonset:
          description: Enables Envoy DaemonSet for Cilium CNI.
          type: boolean
          default: true
    ClusterCreateStruct:
      properties:
        additional_software:
          additionalProperties: {}
          description: |-
            AdditionalSoftware represents information about additional software installed in the cluster.
            Deprecated: do not use.
          type: object
        basic:
          description: |-
            Basic specifies that only a single zonal master will be created.
            It is needed if highly available control-plane is not required.
            False by default.
          type: boolean
        cloud_subnet_cidr:
          x-omitempty: true
          type: string
        enable_patch_version_auto_upgrade:
          description: |-
            EnablePatchVersionAutoUpgrade specifies if Kubernetes version of the cluster is allowed to be upgraded
            automatically.
            Enabled by default for regional clusters and disabled for zonal clusters.
          type: boolean
        enable_autorepair:
          description: EnableAutorepair reflects if worker nodes are allowed to be reinstalled  automatically in case of their unavailability or unhealthiness.
          type: boolean
          default: true
        kube_version:
          description: |-
            KubeVersion represents the needed Kubernetes version of the cluster.
            It should be in x.y.z format.
          type: string
        kubernetes_options:
          $ref: '#/components/schemas/KubernetesOptions'
        maintenance_window_start:
          description: |-
            MaintenanceWindowStart represents UTC time of when the cluster will start its maintenance tasks.
            It should be in hh:mm:ss format if provided.
          type: string
        name:
          description: |-
            Name represent the needed name of the cluster.
            It shouldn't contain more than 32 symbols and can contain latin letters
            with numbers and hyphens and start with a letter or a number.
          type: string
        network_id:
          description: |-
            NetworkID contains a reference to the network of the cluster.
            It can be set in cases where network is pre-created.
          format: uuid4
          type: string
        network_type:
          description: NetworkType represents which network will be used for master-node connection.
          type: string
        pool:
          description: Pool represents the pool of where the cluster master nodes are located.
          type: string
        private_kube_api:
          description: |-
            PrivateKubeAPI specifies if kube API should be available from the Internet or not.
            False by default.
          type: boolean
        subnet_id:
          description: |-
            SubnetID contains a reference to the subnet of the cluster.
            It can be set in cases where subnet is pre-created.
          format: uuid4
          type: string
        cni_type:
          description: |-
            CNI type represents type of CNI which will be used in cluster.
            Supported CNI types are CALICO and CILIUM. CALICO by default.
          type: string
        cni_cilium_settings:
          $ref: '#/components/schemas/CNICiliumSettings'
      required:
        - name
        - network_id
        - subnet_id
        - kube_version
        - private_kube_api
        - pool
        - network_type
        - maintenance_window_start
        - cloud_subnet_cidr
        - basic
        - additional_software
      type: object
    ClusterCreateBody:
      description: |-
        ClusterCreateBody
        represents body content.
      properties:
        cluster:
          $ref: '#/components/schemas/ClusterCreateStruct'
    ClusterDetailed:
